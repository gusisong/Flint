<section id="settings" class="view hidden">
  <div class="panel">
    <div class="page-title">
      <span class="material-symbols-outlined">settings</span>
      系统设置
    </div>
    <div class="toolbar">
      <div class="left-actions">
        <button class="btn primary" onclick="showToast('配置已读取', 'success')">读取配置</button>
      </div>
      <div class="right-actions">
        <button class="btn cta" onclick="showToast('配置已保存', 'success')">保存配置</button>
      </div>
    </div>

    <div style="flex:1;overflow-y:auto;margin-top:14px;">
      <div class="form-section-title">
        <span class="material-symbols-outlined">mail</span>
        SMTP 设置
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>SMTP Host</label>
          <input class="form-input" type="text" value="smtp.example.com">
        </div>
        <div class="form-group">
          <label>SMTP Port</label>
          <input class="form-input" type="text" value="587">
        </div>
        <div class="form-group">
          <label>用户名</label>
          <input class="form-input" type="text" value="sender@example.com">
        </div>
        <div class="form-group">
          <label>密码</label>
          <div class="password-wrap">
            <input class="form-input" type="password" value="encrypted">
            <button class="password-toggle" title="显示/隐藏密码">
              <span class="material-symbols-outlined">visibility_off</span>
            </button>
          </div>
        </div>
      </div>

      <div class="form-section-title">
        <span class="material-symbols-outlined">rule</span>
        规则与签名
      </div>
      <div class="form-group">
        <label>供应商匹配正则</label>
        <input class="form-input" type="text" value="_(\d{5})_[^/]+$">
      </div>
      <div class="form-group">
        <label>签名文本</label>
        <textarea class="form-input">Best Regards,
Flint Transportation System
物流运营部</textarea>
      </div>
    </div>
  </div>
</section>
